<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#008b8b; /* cyan đậm */
    font-family:Arial, sans-serif;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:260px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:4px -12px;
    border:1px solid #ccc;
    border-radius:6px;
}

.login-btn{
    display:block;
    width:100%;
    margin-top: 20px;
    margin-right: 200px;
    padding:5px;
    background:#203a43;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.login-btn:hover{
    background:#009090;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Đăng nhập</h2>

    <input type="text" placeholder="Tên đăng nhập">
    <input type="password" placeholder="Mật khẩu">

    <a href="home.html" class="login-btn">Đăng nhập</a>
</div>

</body>
</html>
